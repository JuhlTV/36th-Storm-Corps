<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrieren | 36th Storm Corps</title>
  <meta name="description" content="Registrierung fuer das 36th Storm Corps Portal mit Zugang zum Forum und internen Bereichen." />
  <meta name="theme-color" content="#020305" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="36th Storm Corps" />
  <meta property="og:title" content="Registrieren | 36th Storm Corps" />
  <meta property="og:description" content="Registrierung fuer das 36th Storm Corps Portal mit Zugang zum Forum und internen Bereichen." />
  <meta property="og:image" content="90b2f19b-4dfd-48df-9bec-dfad5390eb02.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Registrieren | 36th Storm Corps" />
  <meta name="twitter:description" content="Registrierung fuer das 36th Storm Corps Portal mit Zugang zum Forum und internen Bereichen." />
  <meta name="twitter:image" content="90b2f19b-4dfd-48df-9bec-dfad5390eb02.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-auth">
  <div class="noise" aria-hidden="true"></div>
  <div class="auth-ambient" aria-hidden="true"></div>

  <header class="auth-topbar" aria-hidden="true">
    <span class="auth-topbar-item">Republic Secure Portal</span>
    <span class="auth-topbar-sep"></span>
    <span class="auth-topbar-item">Clearance: Aurek-36</span>
    <span class="auth-topbar-sep"></span>
    <span class="auth-topbar-item">Ende-zu-Ende verschluesselt</span>
  </header>

  <div class="auth-page-wrap">
    <div class="auth-card">

      <a href="index.html" class="auth-brand" aria-label="Zur Hauptseite">
        <span class="brand-mark">36</span>
        <span class="brand-text">STORM CORPS</span>
      </a>

      <div class="auth-card-header">
        <p class="auth-security-badge" aria-label="Verbindungsstatus"><span class="auth-security-dot"></span>Secure Connection</p>
        <p class="eyebrow">Neue Registrierung</p>
        <h1 class="auth-title">Account erstellen</h1>
        <p class="auth-subtitle">Werde Teil des Corps und erhalte Zugang zum internen Einheitsforum.</p>
      </div>

      <form id="register-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="reg-username">Username</label>
          <input
            id="reg-username"
            type="text"
            maxlength="32"
            placeholder="a–z, 0–9, . _ -"
            autocomplete="username"
            required
          />
        </div>
        <div class="auth-field">
          <label for="reg-display">Anzeigename</label>
          <input
            id="reg-display"
            type="text"
            maxlength="120"
            placeholder="Wird im Forum angezeigt"
            autocomplete="name"
            required
          />
        </div>
        <div class="auth-field">
          <label for="reg-email">E-Mail <span class="auth-optional">(optional)</span></label>
          <input
            id="reg-email"
            type="email"
            maxlength="160"
            placeholder="optional"
            autocomplete="email"
          />
        </div>
        <div class="auth-field">
          <label for="reg-password">Passwort</label>
          <div class="auth-password-wrap">
            <input
              id="reg-password"
              type="password"
              maxlength="160"
              placeholder="Mindestens 8 Zeichen"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              class="auth-pass-toggle"
              data-toggle-password="reg-password"
              aria-label="Passwort anzeigen"
              aria-pressed="false"
            >Anzeigen</button>
          </div>
        </div>
        <p class="auth-note" id="register-note" aria-live="polite"></p>
        <button class="btn btn-primary auth-submit" type="submit">Account erstellen</button>
      </form>

      <div class="auth-divider"><span>oder</span></div>

      <p class="auth-switch">Bereits registriert? <a href="login.html" id="switch-login-link">Einloggen</a></p>
      <a href="forum.html" class="auth-back">← Zurück zum Forum</a>

    </div>
  </div>

  <div id="toast-root" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script>
    const getSafeRedirectTarget = (fallback = 'forum.html') => {
      const raw = new URLSearchParams(window.location.search).get('redirect') || '';
      if (!raw) return fallback;

      try {
        const decoded = decodeURIComponent(raw).trim();
        if (!decoded) return fallback;
        if (decoded.startsWith('http://') || decoded.startsWith('https://') || decoded.startsWith('//')) return fallback;
        if (decoded.includes('..') || decoded.includes('\\')) return fallback;
        return decoded;
      } catch (_) {
        return fallback;
      }
    };

    const toastRoot = document.getElementById('toast-root');
    const showToast = (message, type = 'info') => {
      if (!toastRoot || !message) return;
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.textContent = message;
      toastRoot.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('is-visible'));
      window.setTimeout(() => {
        toast.classList.remove('is-visible');
        window.setTimeout(() => toast.remove(), 220);
      }, 2600);
    };

    const redirectTarget = getSafeRedirectTarget('forum.html');
    const switchLoginLink = document.getElementById('switch-login-link');
    if (switchLoginLink && redirectTarget) {
      switchLoginLink.href = `login.html?redirect=${encodeURIComponent(redirectTarget)}`;
    }

    document.querySelectorAll('[data-toggle-password]').forEach((toggle) => {
      toggle.addEventListener('click', () => {
        const fieldId = toggle.getAttribute('data-toggle-password');
        const input = fieldId ? document.getElementById(fieldId) : null;
        if (!input) return;

        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        toggle.textContent = showing ? 'Anzeigen' : 'Verbergen';
        toggle.setAttribute('aria-pressed', showing ? 'false' : 'true');
        toggle.setAttribute('aria-label', showing ? 'Passwort anzeigen' : 'Passwort verbergen');
      });
    });

    (async () => {
      try {
        const res = await fetch('/api/me', { credentials: 'same-origin' });
        if (res.ok) {
          const data = await res.json();
          if (data.user) {
            window.location.replace(redirectTarget);
          }
        }
      } catch (_) {}
    })();

    const form = document.getElementById('register-form');
    const note = document.getElementById('register-note');
    const submitBtn = form.querySelector('[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const displayName = document.getElementById('reg-display').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      note.textContent = '';
      note.className = 'auth-note';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Erstellen…';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, displayName, email, password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || `Fehler ${res.status}`);
        }

        note.textContent = 'Registrierung erfolgreich. Weiterleitung…';
        note.className = 'auth-note auth-note--success';
        showToast('Registrierung erfolgreich', 'success');
        document.getElementById('reg-password').value = '';

        window.location.replace(redirectTarget);
      } catch (err) {
        note.textContent = err.message;
        note.className = 'auth-note auth-note--error';
        showToast(err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Account erstellen';
      }
    });
  </script>
</body>
</html>
